{% if message.role == "user" and not message.metadata.widget_answer %}
<div class="msg user" data-message-id="{{ message.id }}">
    <div class="msg-text">{{ message.content }}</div>
</div>
{% else %}
<div class="msg-turn" data-message-id="{{ message.id }}">
    {% if message.content %}
    <div class="msg assistant">
        <div class="msg-text">{{ message.content }}</div>
    </div>
    {% endif %}
    {% if widgets %}
    <div class="widget-stack" data-widgets='{{ widgets_json }}'></div>
    {% endif %}
</div>
{% endif %}
